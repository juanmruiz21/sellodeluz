<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sello de Luz | Juano Ruiz Fotografía</title>
    
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0b0b0b; 
            --card-bg: #151515; 
            --accent: #3b82f6; 
            --text: #ffffff; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { padding: 30px 0 20px; text-align: center; }
        .logo-main { width: 120px; opacity: 0.9; margin-bottom: 10px; }
        .brand-name { font-size: 1.4rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; margin: 0; }

        .container { width: 90%; max-width: 600px; padding-bottom: 50px; }
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
        }

        /* Estilo para la vista previa de la foto cargada */
        #imgCargada {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none; /* Se muestra al cargar */
            border: 1px dashed #333;
        }

        .input-luz {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 15px; border-radius: 12px;
            margin-bottom: 15px; font-family: 'Inter', sans-serif; box-sizing: border-box;
            outline: none;
        }

        .btn-main {
            background: transparent; color: var(--text); padding: 18px; border-radius: 15px;
            font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            width: 100%; border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 10px; text-decoration: none; transition: 0.3s;
        }
        .btn-generate { background: var(--accent); border: none; }
        .btn-generate:disabled { opacity: 0.2; cursor: not-allowed; }

        #previewContainer { margin-top: 25px; display: none; }
        #preview { width: 100%; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        canvas { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Juano Ruiz" class="logo-main">
    <h1 class="brand-name">SELLO DE LUZ</h1>
</header>

<div class="container">
    <div class="card">
        <img id="imgCargada" alt="Foto seleccionada">

        <label for="upload" class="btn-main">📂 1. SELECCIONAR FOTOGRAFÍA</label>
        <input type="file" id="upload" accept="image/jpeg, image/jpg">
        
        <input type="text" id="inputManual" class="input-luz" placeholder="Notas (Iluminación, Estudio...)">
        
        <button id="generateBtn" class="btn-main btn-generate" disabled>2. CREAR TARJETA EXIF</button>

        <div id="previewContainer">
            <p style="font-size: 0.8rem; color: #888;">RESULTADO FINAL:</p>
            <img id="preview" alt="Resultado">
            <a id="downloadBtn" class="btn-main" style="background:#22c55e; border:none; margin-top:15px;">💾 DESCARGAR FOTO</a>
        </div>
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

<script>
    const upload = document.getElementById('upload');
    const imgCargada = document.getElementById('imgCargada');
    const inputManual = document.getElementById('inputManual');
    const generateBtn = document.getElementById('generateBtn');
    const preview = document.getElementById('preview');
    const previewContainer = document.getElementById('previewContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    let originalImg = new Image();
    let exifData = null;

    const iconPaths = {

        iso: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 7h10v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2z",
        mm: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"
    };

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Ocultar resultados previos
        previewContainer.style.display = "none";

        try {
            exifData = await exifr.parse(file, { lens: true });
            const reader = new FileReader();
            reader.onload = (ev) => {
                // Mostrar la imagen en el recuadro superior
                imgCargada.src = ev.target.result;
                imgCargada.style.display = "block";
                
                originalImg.onload = () => { generateBtn.disabled = false; };
                originalImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        } catch (err) { alert("Error al cargar la imagen."); }
    });

    generateBtn.addEventListener('click', () => {
        canvas.width = originalImg.width;
        canvas.height = originalImg.height;
        ctx.drawImage(originalImg, 0, 0);

        const base = canvas.width / 100;
        const tarjetaW = canvas.width * 0.90;
        const tarjetaH = canvas.height * 0.88;
        const tarjetaX = (canvas.width - tarjetaW) / 2;
        const tarjetaY = (canvas.height - tarjetaH) / 2;

        // FONDO HUMO
        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.beginPath();
        ctx.roundRect(tarjetaX, tarjetaY, tarjetaW, tarjetaH, base * 2.5);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 255, 255, 0.1)";
        ctx.stroke();
        ctx.restore();

        const drawBlock = (icon, label, value, x, y) => {
            ctx.save();
            ctx.translate(x, y);
            const scale = (base * 3.5) / 24;
            ctx.scale(scale, scale);
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.fill(new Path2D(icon));
            ctx.restore();
            ctx.textAlign = "left";
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.font = `600 ${base * 1.3}px 'Inter'`;
            ctx.fillText(label, x + base * 5, y + base * 1.2);
            ctx.fillStyle = "white";
            ctx.font = `500 ${base * 3.2}px 'JetBrains Mono
