<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sello de Luz | Juano Ruiz Fotografía</title>
    
    <link rel="shortcut icon" type="image/png" href="logo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root { --bg: #000000; --card-bg: #111111; --accent: #3b82f6; --success: #10b981; --text: #ffffff; --muted: #a1a1aa; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { padding: 50px 0 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        /* LOGO MÁS GRANDE */
        .logo-main { width: 150px; height: auto; filter: drop-shadow(0 0 15px rgba(255,255,255,0.1)); }
        
        .brand-name { font-size: clamp(2.8rem, 9vw, 4.2rem); font-weight: 900; letter-spacing: -2px; line-height: 1; margin: 0; text-transform: uppercase; text-align: center; }
        .brand-subtitle { font-size: 1rem; letter-spacing: 5px; text-transform: uppercase; color: var(--muted); margin-top: 5px; text-align: center; }

        .container { width: 95%; max-width: 900px; padding-bottom: 50px; }
        .card { 
            background: var(--card-bg); padding: 40px; border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
