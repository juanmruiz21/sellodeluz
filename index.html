<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sello de Luz | Juano Ruiz Fotografía</title>
    
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0b0b0b; 
            --card-bg: #151515; 
            --accent: #3b82f6; 
            --text: #ffffff; 
            --muted: #a1a1aa;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { padding: 40px 0 20px; text-align: center; width: 100%; }
        .logo-main { width: 150px; height: auto; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.3)); }
        .brand-name { font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin-top: 10px; }

        .container { width: 95%; max-width: 700px; padding-bottom: 60px; }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 25px; 
            border: 1px solid rgba(255,255,255,0.08); text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        #imgCargada {
            width: 100%; max-height: 350px; object-fit: contain;
            border-radius: 15px; margin-bottom: 20px; display: none;
            border: 1px solid #333; background: #000;
        }

        .input-luz {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 15px; border-radius: 12px;
            margin-bottom: 15px; font-family: 'Inter', sans-serif; box-sizing: border-box;
            outline: none; font-size: 1rem;
        }

        .btn-main {
            background: transparent; color: var(--text); padding: 18px; border-radius: 15px;
            font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            width: 100%; border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 10px; text-decoration: none; transition: 0.3s; gap: 10px;
        }
        .btn-generate { background: var(--accent); border: none; }
        .btn-generate:disabled { opacity: 0.2; cursor: not-allowed; }

        #previewContainer { margin-top: 30px; display: none; }
        #preview { width: 100%; border-radius: 15px; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }

        .social-dock { display: flex; justify-content: center; gap: 25px; margin-top: 40px; flex-wrap: wrap; }
        .social-link { color: var(--text); text-decoration: none; opacity: 0.6; font-size: 1.8rem; transition: 0.3s; display: flex; flex-direction: column; align-items: center; }
        .social-link:hover { opacity: 1; transform: translateY(-3px); color: var(--accent); }
        .social-link span { font-size: 0.7rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

        canvas { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Juano Ruiz" class="logo-main">
    <h1 class="brand-name">SELLO DE LUZ</h1>
</header>

<div class="container">
    <div class="card">
        <img id="imgCargada" alt="Previsualización">

        <label for="upload" class="btn-main"><i class="fas fa-camera"></i> 1. CARGAR FOTOGRAFÍA</label>
        <input type="file" id="upload" accept="image/jpeg, image/jpg">
        
        <input type="text" id="inputManual" class="input-luz" placeholder="Esquema de iluminación o Estudio...">
        
        <button id="generateBtn" class="btn-main btn-generate" disabled><i class="fas fa-magic"></i> 2. GENERAR TARJETA CENTRAL</button>

        <div id="previewContainer">
            <img id="preview" alt="Resultado Final">
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <a id="downloadBtn" class="btn-main" style="background:#10b981; border:none;"><i class="fas fa-download"></i> GUARDAR</a>
                <button id="shareBtn" class="btn-main"><i class="fas fa-share-alt"></i> COMPARTIR</button>
            </div>
        </div>
    </div>

    <div class="social-dock">
        <a href="https://wa.me/5491133832660" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i><span>WhatsApp</span></a>
        <a href="https://www.instagram.com/juanoruiz/" target="_blank" class="social-link"><i class="fab fa-instagram"></i><span>Instagram</span></a>
        <a href="https://www.threads.net/@juanoruiz" target="_blank" class="social-link"><i class="fab fa-threads"></i><span>Threads</span></a>
        <a href="https://www.facebook.com/Juan0Ruiz/" target="_blank" class="social-link"><i class="fab fa-facebook-f"></i><span>Facebook</span></a>
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>

<script>
    const upload = document.getElementById('upload');
    const imgCargada = document.getElementById('imgCargada');
    const inputManual = document.getElementById('inputManual');
    const generateBtn = document.getElementById('generateBtn');
    const preview = document.getElementById('preview');
    const previewContainer = document.getElementById('previewContainer');
    const downloadBtn = document.getElementById('downloadBtn');
    const shareBtn = document.getElementById('shareBtn');
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    
    let originalImg = new Image();
    let exifData = null;

    const iconPaths = {
        f: "M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2m0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8m-4-8h8m-4-4v8",
        t: "M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z",
        iso: "M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 7h10v2H7V7zm0 4h10v2H7v-2zm0 4h7v2H7v-2z",
        mm: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z"
    };

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        previewContainer.style.display = "none";
        try {
            exifData = await exifr.parse(file, { lens: true });
            const reader = new FileReader();
            reader.onload = (ev) => {
                imgCargada.src = ev.target.result;
                imgCargada.style.display = "block";
                originalImg.onload = () => { generateBtn.disabled = false; };
                originalImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        } catch (err) { alert("Error al leer archivo."); }
    });

    generateBtn.addEventListener('click', () => {
        canvas.width = originalImg.width;
        canvas.height = originalImg.height;
        ctx.drawImage(originalImg, 0, 0);

        const base = canvas.width / 100;
        const tarjetaW = canvas.width * 0.90;
        const tarjetaH = canvas.height * 0.88;
        const tarjetaX = (canvas.width - tarjetaW) / 2;
        const tarjetaY = (canvas.height - tarjetaH) / 2;

        ctx.save();
        ctx.fillStyle = "rgba(0, 0, 0, 0.42)";
        ctx.beginPath();
        ctx.roundRect(tarjetaX, tarjetaY, tarjetaW, tarjetaH, base * 2.5);
        ctx.fill();
        ctx.restore();

        const drawBlock = (icon, label, value, x, y) => {
            ctx.save();
            ctx.translate(x, y);
            const scale = (base * 5.5) / 24; // Iconos más grandes
            ctx.scale(scale, scale);
            ctx.fillStyle = "rgba(255,255,255,0.95)";
            ctx.fill(new Path2D(icon));
            ctx.restore();

            ctx.textAlign = "left";
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            ctx.font = `600 ${base * 1.5}px 'Inter'`;
            ctx.fillText(label, x + base * 7, y + base * 1.5);

            ctx.fillStyle = "white";
            ctx.font = `bold ${base * 5.5}px 'JetBrains Mono'`; // Valores mucho más grandes
            ctx.fillText(value, x + base * 7, y + base * 6.5);
        };

        const colA = tarjetaX + base * 8;
        const colB = tarjetaX + tarjetaW / 2 + base * 2;
        let row = tarjetaY + base * 15;

        const f = exifData?.FNumber ? `f/${exifData.FNumber}` : 'f/--';
        const t = exifData?.ExposureTime ? (exifData.ExposureTime >= 1 ? `${exifData.ExposureTime}s` : `1/${Math.round(1/exifData.ExposureTime)}s`) : '--s';
        const iso = exifData?.ISO ? `${exifData.ISO}` : '--';
        const mm = exifData?.FocalLength ? `${exifData.FocalLength}mm` : '--mm';

        drawBlock(iconPaths.f, "APERTURA", f, colA, row);
        drawBlock(iconPaths.t, "OBTURACIÓN", t, colB, row);
        row += base * 22; // Más espacio entre filas
        drawBlock(iconPaths.iso, "ISO", iso, colA, row);
        drawBlock(iconPaths.mm, "FOCAL", mm, colB, row);

        row += base * 22;
        ctx.textAlign = "center";
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = `800 ${base * 3.2}px 'Inter'`; // Cámara más grande
        ctx.fillText((exifData?.Model || "CÁMARA").toUpperCase(), canvas.width / 2, row);
        
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.font = `500 ${base * 1.8}px 'Inter'`;
        ctx.fillText((exifData?.LensModel || "OBJETIVO").toUpperCase(), canvas.width / 2, row + base * 5);

        if (inputManual.value) {
            ctx.fillStyle = "rgba(59, 130, 246, 0.7)";
            ctx.font = `italic 600 ${base * 1.8}px 'Inter'`;
            ctx.fillText(`“ ${inputManual.value.toUpperCase()} ”`, canvas.width / 2, row + base * 13);
        }

        ctx.fillStyle = "white";
        ctx.font = `900 ${base * 6}px 'Inter'`; // Firma imponente
        ctx.letterSpacing = "3px";
        ctx.fillText("JUANO RUIZ PHOTOGRAPHY", canvas.width / 2, tarjetaY + tarjetaH - base * 7);

        preview.src = canvas.toDataURL("image/jpeg", 0.95);
        previewContainer.style.display = "block";
        downloadBtn.href = preview.src;
        downloadBtn.download = `JuanoRuiz_Sello.jpg`;
    });

    shareBtn.addEventListener('click', async () => {
        try {
            const blob = await (await fetch(preview.src)).blob();
            const file = new File([blob], 'SelloJuanoRuiz.jpg', { type: 'image/jpeg' });
            if (navigator.share) await navigator.share({ files: [file] });
        } catch (e) { alert("Tu navegador no soporta compartir directamente."); }
    });
</script>
</body>
</html>
