<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sello de Luz | Juano Ruiz Fotografía</title>
    
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0b0b0b; 
            --card-bg: #151515; 
            --accent: #3b82f6; 
            --text: #ffffff; 
            --muted: #666666; 
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text); margin: 0;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { padding: 40px 0 20px; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .logo-main { width: 140px; height: auto; margin-bottom: 10px; opacity: 0.9; }
        .brand-name { font-size: 1.5rem; font-weight: 900; letter-spacing: 4px; text-transform: uppercase; margin: 0; }

        .container { width: 90%; max-width: 600px; padding-bottom: 50px; }
        .card { 
            background: var(--card-bg); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .input-luz {
            width: 100%; background: #000; border: 1px solid #333;
            color: white; padding: 15px; border-radius: 12px;
            margin: 15px 0; font-family: 'Inter', sans-serif; box-sizing: border-box;
            outline: none; transition: 0.3s;
        }
        .input-luz:focus { border-color: var(--accent); }

        .btn-main {
            background: transparent; color: var(--text); padding: 18px; border-radius: 15px;
            font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
            width: 100%; border: 1px solid rgba(255,255,255,0.2);
            margin: 8px auto; text-decoration: none; transition: 0.3s;
        }
        .btn-generate { background: var(--accent); border: none; }
        .btn-generate:disabled { opacity: 0.2; cursor: not-allowed; }

        #previewContainer { margin-top: 30px; border-radius: 15px; overflow: hidden; display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #preview { width: 100%; height: auto; display: block; }
        
        canvas { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<header>
    <img src="logo.png" alt="Juano Ruiz" class="logo-main">
    <h1 class="brand-name">SELLO DE LUZ</h1>
</header>

<div class="container">
    <div class="card">
        <label for="upload" class="btn-main">📂 CARGAR FOTOGRAFÍA</label>
        <input type="file" id="upload" accept="image/jpeg, image/jpg">
        
        <input type="text" id="inputManual" class="input-luz" placeholder="Iluminación / Estudio / Notas (Opcional)">
        
        <button id="generateBtn" class="btn-main btn-generate" disabled>CREAR TARJETA EXIF</button>

        <div id="previewContainer">
            <img id="preview" alt="Resultado">
            <a id="downloadBtn" class="btn-main" style="background:#22c55e; border:none; margin-top:15px;">💾 DESCARGAR RESULTADO</a>
        </div>
    </div>
</div>

<canvas id="mainCanvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js"></script>
