<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sello de Luz - Editor EXIF</title>
    <style>
        /* Configuración de la Base */
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Contenedor de la Imagen */
        .contenedor-imagen {
            position: relative;
            width: 100%;
            max-width: 800px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .foto-original {
            width: 100%;
            display: block;
        }

        /* EL RECUADRO TRASLÚCIDO (Efecto Vidrio) */
        .tarjeta-exif {
            position: absolute;
            bottom: 3%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%; /* Ocupa casi la totalidad */
            
            /* Efecto Traslúcido Moderno */
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            color: white;
            box-sizing: border-box;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        /* Estilo de los datos */
        .fila-datos {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            gap: 10px;
        }

        .dato-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        /* Iconos SVG integrados (No dependen de internet) */
        .icon {
            width: 18px;
            height: 18px;
            fill: #ffffff;
        }

        /* Apartado de Iluminación Manual */
        .iluminacion-seccion {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 13px;
            width: 100%;
            display: flex;
            gap: 10px;
        }

        /* El texto que puedes editar con un toque */
        .editable {
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px dashed rgba(255,255,255,0.4);
            flex-grow: 1;
            outline: none;
        }
    </style>
</head>
<body>

    <h2 style="color: white;">Sello de Luz</h2>
    <p style="color: #aaa; font-size: 12px;">Modo Edición - Vista Previa</p>

    <div class="contenedor-imagen">
        <img src="https://images.unsplash.com/photo-1452570053594-1b985d6ea890?auto=format&fit=crop&w=800&q=80" class="foto-original" alt="Fotografía">

        <div class="tarjeta-exif">
            <div class="fila-datos">
                <div class="dato-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 1 0 5 5 5 5 0 0 0-5-5m0 2a3 3 0 1 1-3 3 3 3 0 0 1 3-3Z"/></svg>
                    <span>Nikon D7200</span>
                </div>

                <div class="dato-item">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2m0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8m0-12.5A4.5 4.5 0 1 0 16.5 12 4.5 4.5 0 0 0 12 7.5m0 7A2.5 2.5 0 1 1 14.5 12 2.5 2.5 0 0 1 12 14.5Z"/></svg>
                    <span>Sigma 17-50mm f/2.8</span>
                </div>

                <div class="dato-item"><strong>f/</strong> 2.8</div>
                <div class="dato-item"><strong>⏲</strong> 1/125s</div>
                <div class="dato-item"><strong>ISO</strong> 400</div>
                <div class="dato-item"><strong>📏</strong> 55mm</div>
            </div>

            <div class="iluminacion-seccion">
                <span>💡 Iluminación:</span>
                <div class="editable" contenteditable="true">
                    Toca aquí para escribir (ej. Softbox lateral a 45°)
                </div>
            </div>
        </div>
    </div>

    <p style="color: #666; font-size: 11px; margin-top: 20px;">
        Sello de Luz - Proyecto de Juan Manuel Ruiz
    </p>

</body>
</html>
